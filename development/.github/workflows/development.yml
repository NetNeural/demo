name: Development Pipeline

on:
  push:
    branches: [development, feature/*]
    paths: ['development/**']
  pull_request:
    branches: [development]
    paths: ['development/**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Test & Quality Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: development

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: netneural_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: development/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🚀 Start Supabase local development setup
        run: supabase start

      - name: 📊 Run database migrations
        run: supabase db push

      - name: 🔧 Generate TypeScript types
        run: npm run supabase:types

      - name: 🔍 Run type checking
        run: npm run type-check

      - name: 🎨 Run linting
        run: npm run lint

      - name: 📐 Check code formatting
        run: npm run format:check

      - name: 🧪 Run unit tests
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          file: development/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: 🏗️ Test build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_LOCAL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_LOCAL }}

      - name: 🎭 Install Playwright
        run: npx playwright install --with-deps

      - name: 🧪 Run E2E tests
        run: npm run test:e2e
        env:
          NODE_ENV: test
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY_LOCAL }}

      - name: 📸 Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: development/playwright-report/
          retention-days: 30

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: development

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: development/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🔍 Run security audit
        run: npm audit --audit-level high

      - name: 🔍 Run dependency check
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

      - name: 🕵️ Run CodeQL analysis
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          source-root: development

      - name: 🔍 Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  deploy-preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: development

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: development/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🏗️ Build application
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL_DEV }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY_DEV }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_DEV }}
          GOLIOTH_API_KEY: ${{ secrets.GOLIOTH_API_KEY_DEV }}

      - name: 🚀 Deploy to Netlify Preview
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: development/out
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: 'Deploy from GitHub Actions'
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_DEV }}

  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    needs: [test, security]
    if: always()

    steps:
      - name: 📊 Report Status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const testResult = '${{ needs.test.result }}';
            const securityResult = '${{ needs.security.result }}';

            const status = testResult === 'success' && securityResult === 'success' 
              ? '✅ All checks passed!' 
              : '❌ Some checks failed';

            const body = `
            ## 🚀 Development Pipeline Results

            | Check | Status |
            |-------|--------|
            | Tests & Quality | ${testResult === 'success' ? '✅' : '❌'} |
            | Security Audit | ${securityResult === 'success' ? '✅' : '❌'} |

            ${status}

            **Branch:** \`${context.ref}\`
            **Commit:** \`${context.sha.substring(0, 7)}\`
            `;

            if (context.eventName === 'pull_request') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

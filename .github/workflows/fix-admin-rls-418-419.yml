name: Fix Admin RLS - Issues 418 & 419

on:
  workflow_dispatch:

jobs:
  fix-staging:
    name: Apply to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Apply RLS fix via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: atgbmxicqikmapfqouco
        run: |
          SQL=$(cat <<'ENDSQL'
          DROP POLICY IF EXISTS "promo_codes_insert" ON promotional_codes;
          DROP POLICY IF EXISTS "promo_codes_update" ON promotional_codes;
          DROP POLICY IF EXISTS "promo_codes_delete" ON promotional_codes;
          DROP POLICY IF EXISTS "promo_codes_select" ON promotional_codes;
          CREATE POLICY "promo_codes_select" ON promotional_codes FOR SELECT USING (EXISTS (SELECT 1 FROM users u WHERE u.id = auth.uid() AND u.role = 'super_admin') OR EXISTS (SELECT 1 FROM organization_members om WHERE om.user_id = auth.uid() AND om.organization_id = promotional_codes.organization_id AND om.role = 'owner'));
          CREATE POLICY "promo_codes_insert" ON promotional_codes FOR INSERT WITH CHECK (EXISTS (SELECT 1 FROM users u WHERE u.id = auth.uid() AND u.role = 'super_admin'));
          CREATE POLICY "promo_codes_update" ON promotional_codes FOR UPDATE USING (EXISTS (SELECT 1 FROM users u WHERE u.id = auth.uid() AND u.role = 'super_admin'));
          CREATE POLICY "promo_codes_delete" ON promotional_codes FOR DELETE USING (EXISTS (SELECT 1 FROM users u WHERE u.id = auth.uid() AND u.role = 'super_admin'));
          GRANT SELECT, INSERT, UPDATE, DELETE ON promotional_codes TO authenticated;
          DROP POLICY IF EXISTS "account_credits_select" ON account_credits;
          DROP POLICY IF EXISTS "account_credits_insert" ON account_credits;
          DROP POLICY IF EXISTS "account_credits_update" ON account_credits;
          DROP POLICY IF EXISTS "account_credits_delete" ON account_credits;
          CREATE POLICY "account_credits_select" ON account_credits FOR SELECT USING (EXISTS (SELECT 1 FROM users u WHERE u.id = auth.uid() AND u.role = 'super_admin') OR EXISTS (SELECT 1 FROM organization_members om WHERE om.user_id = auth.uid() AND om.organization_id = account_credits.organization_id AND om.role IN ('owner', 'billing')));
          CREATE POLICY "account_credits_insert" ON account_credits FOR INSERT WITH CHECK (EXISTS (SELECT 1 FROM users u WHERE u.id = auth.uid() AND u.role = 'super_admin'));
          CREATE POLICY "account_credits_update" ON account_credits FOR UPDATE USING (EXISTS (SELECT 1 FROM users u WHERE u.id = auth.uid() AND u.role = 'super_admin'));
          CREATE POLICY "account_credits_delete" ON account_credits FOR DELETE USING (EXISTS (SELECT 1 FROM users u WHERE u.id = auth.uid() AND u.role = 'super_admin'));
          GRANT SELECT, INSERT, UPDATE, DELETE ON account_credits TO authenticated;
          ENDSQL
          )
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.supabase.com/v1/projects/${PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $(echo "$SQL" | jq -Rs .)}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ]; then
            echo "::error::Failed with HTTP $HTTP_CODE"
            exit 1
          fi


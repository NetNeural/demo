name: Production Smoke Tests

on:
  # Run manually on demand
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development

  # Auto-run 15 minutes after a successful deployment
  workflow_run:
    workflows:
      - 'Deploy to Production'
      - 'Deploy to Staging'
    types:
      - completed

jobs:
  smoke-test:
    name: Smoke Tests — ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    # Only run post-deploy smoke tests when the triggering workflow succeeded
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    defaults:
      run:
        working-directory: development

    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.environment == 'staging' && 'https://demo-stage.netneural.ai' || github.event.inputs.environment == 'development' && 'https://demo.netneural.ai' || 'https://sentinel.netneural.ai' }}
      TEST_USER_EMAIL: ${{ secrets.PROD_SMOKE_TEST_EMAIL || 'admin@netneural.ai' }}
      TEST_USER_PASSWORD: ${{ secrets.PROD_SMOKE_TEST_PASSWORD || 'password123' }}
      # Supabase not needed for smoke tests (hitting live site)
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: development/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium only for speed)
        run: npx playwright install chromium --with-deps

      - name: Run production smoke tests
        run: |
          npx playwright test tests/playwright/production-validation.spec.ts \
            --project=chromium \
            --reporter=list,json \
            --output=test-results/smoke
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-results-${{ github.run_id }}
          path: development/test-results/smoke/
          retention-days: 7

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report-${{ github.run_id }}
          path: development/playwright-report/
          retention-days: 7

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const env = '${{ github.event.inputs.environment || 'production' }}'
            const url = '${{ env.PLAYWRIGHT_BASE_URL }}'
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Smoke test failure on ${env} (run #${context.runNumber})`,
              body: [
                `## Production Smoke Test Failure`,
                `**Environment:** ${env}`,
                `**URL:** ${url}`,
                `**Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                ``,
                `Please review the [test artifacts](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) and investigate before the next deployment.`,
              ].join('\n'),
              labels: ['bug', 'production', 'smoke-test-failure'],
            })

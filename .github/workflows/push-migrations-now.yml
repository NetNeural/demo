name: Push DB Migrations (Manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to push migrations to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - dev
          - prod
          - all

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push migrations to Staging
        if: inputs.environment == 'staging' || inputs.environment == 'all'
        working-directory: development
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Pushing migrations to staging (atgbmxicqikmapfqouco)..."
          npx supabase link --project-ref atgbmxicqikmapfqouco
          # Repair: mark remote-only migration records as reverted so push can proceed
          npx supabase migration repair --status reverted \
            20260228335000 20260228390000 \
            20260301000000 20260301100000 20260301120000 20260301130000 \
            20260301160000 20260301171000 20260301173840 \
            20260301204301 20260301204654 \
            20260302000000 20260302000001 20260302100000 \
            20260302200000 20260302210000 20260302220000 20260302230000 \
            20260302250000 20260302260000 20260302270000 20260302280000 \
            20260302290000 20260302300000 20260302310000 20260302320000 \
            20260302330000 20260302340000 20260302350000 20260302360000 \
            20260302370000 \
            20260303100000 20260303200000 20260303220000 \
            20260303230000 20260303250000 20260303260000 \
            20260304000000 2>/dev/null || true
          npx supabase db push --linked --yes
          echo "✅ Staging migrations done"

      - name: Push migrations to Dev
        if: inputs.environment == 'dev' || inputs.environment == 'all'
        working-directory: development
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Pushing migrations to dev (tsomafkalaoarnuwgdyu)..."
          npx supabase link --project-ref tsomafkalaoarnuwgdyu
          # Repair: mark remote-only migration records as reverted so push can proceed
          npx supabase migration repair --status reverted \
            20260228335000 20260228390000 \
            20260301000000 20260301100000 20260301120000 20260301130000 \
            20260301160000 20260301171000 20260301173840 \
            20260301204301 20260301204654 \
            20260302000000 20260302000001 20260302100000 \
            20260302200000 20260302210000 20260302220000 20260302230000 \
            20260302250000 20260302260000 20260302270000 20260302280000 \
            20260302290000 20260302300000 20260302310000 20260302320000 \
            20260302330000 20260302340000 20260302350000 20260302360000 \
            20260302370000 \
            20260303100000 20260303200000 20260303220000 \
            20260303230000 20260303250000 20260303260000 \
            20260304000000 2>/dev/null || true
          npx supabase db push --linked --yes
          echo "✅ Dev migrations done"

      - name: Push migrations to Prod
        if: inputs.environment == 'prod' || inputs.environment == 'all'
        working-directory: development
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          echo "Pushing migrations to prod (bldojxpockljyivldxwf)..."
          npx supabase link --project-ref bldojxpockljyivldxwf
          # Repair: mark remote-only migration records as reverted so push can proceed
          npx supabase migration repair --status reverted \
            20260228335000 20260228390000 \
            20260301000000 20260301100000 20260301120000 20260301130000 \
            20260301160000 20260301171000 20260301173840 \
            20260301204301 20260301204654 \
            20260302000000 20260302000001 20260302100000 \
            20260302200000 20260302210000 20260302220000 20260302230000 \
            20260302250000 20260302260000 20260302270000 20260302280000 \
            20260302290000 20260302300000 20260302310000 20260302320000 \
            20260302330000 20260302340000 20260302350000 20260302360000 \
            20260302370000 \
            20260303100000 20260303200000 20260303220000 \
            20260303230000 20260303250000 20260303260000 \
            20260304000000 2>/dev/null || true
          npx supabase db push --linked --yes
          echo "✅ Prod migrations done"

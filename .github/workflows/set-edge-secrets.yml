name: Set Edge Function Secrets

on:
  workflow_dispatch:

jobs:
  set-secrets-staging:
    name: Set secrets on Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Set RESEND_API_KEY on staging
        run: |
          supabase secrets set RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            --project-ref atgbmxicqikmapfqouco
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  set-secrets-prod:
    name: Set secrets on Prod
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Set RESEND_API_KEY on prod
        run: |
          supabase secrets set RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            --project-ref bldojxpockljyivldxwf
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  set-secrets-dev:
    name: Set secrets on Dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Set RESEND_API_KEY on dev
        run: |
          supabase secrets set RESEND_API_KEY=${{ secrets.RESEND_API_KEY }} \
            --project-ref tsomafkalaoarnuwgdyu
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
